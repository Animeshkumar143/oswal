<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | OSWAL Publication ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Raleway:wght@600;800&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
<link rel="stylesheet" href="style.css"/>
</head>

<body class="erp-login-body">

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="company-icon">
        <i class="bi bi-book-half"></i>
      </div>
      <h1>OSWAL Publication</h1>
      <p>ERP Login Panel</p>
    </div>

    <div class="login-body">

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="Enter your email" required />
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="login-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>

    </div>

    <div class="login-footer">
      © 2026 OSWAL Publication ERP | Internal Use Only
    </div>

  </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("errorMessage");

  if(!email || !password){
    showError("All fields are required");
    return;
  }

  const role = detectRole(email);

  if(!role){
    showError("Invalid domain. Use official company email.");
    return;
  }

  localStorage.setItem("erp_logged_in", "true");
  localStorage.setItem("erp_user_email", email);
  localStorage.setItem("erp_user_role", role);

  window.location.href = "admin-dashboard.html";
});

function detectRole(email){
  if(email.endsWith("@admin.com")) return "Admin";
  if(email.endsWith("@publisher.com")) return "Publisher";
  if(email.endsWith("@distributor.com")) return "Distributor";
  if(email.endsWith("@retailer.com")) return "Retailer";
  if(email.endsWith("@client.com")) return "Client";
  if(email.endsWith("@employee.com")) return "Employee";
  return null;
}

function showError(msg){
  const box = document.getElementById("errorMessage");
  box.innerText = msg;
  box.style.display = "block";
}
</script>

</body>
</html>
